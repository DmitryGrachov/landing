services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gallery
      POSTGRES_PASSWORD: gallery
      POSTGRES_DB: gallery
    volumes:
      - gallery_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gallery -d gallery"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gallery:gallery@db:5432/gallery?schema=public
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      UPLOADS_DIR: uploads
      MAX_UPLOAD_MB: 25
      # Read-only mount of the legacy frontend assets, used once by the seed
      # step to copy gallery-data.json's files into the uploads volume.
      LEGACY_FRONTEND_PUBLIC_DIR: /legacy-frontend-public
    ports:
      - "4000:4000"
    volumes:
      - gallery_uploads:/app/uploads
      - ./frontend/public:/legacy-frontend-public:ro

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  gallery_pgdata:
  gallery_uploads:
