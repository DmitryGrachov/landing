server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Must be >= backend's MAX_UPLOAD_MB (see docker-compose.yml), otherwise
    # nginx 413s uploads before they ever reach Express/Multer.
    client_max_body_size 30M;

    # Docker's embedded DNS. Needed so proxy_pass below re-resolves
    # "lead-service" on every request instead of caching whatever IP it had
    # at nginx startup — without this, restarting/recreating just the
    # lead-service container (without also restarting frontend) leaves
    # nginx proxying to a dead IP and 502ing forever until frontend restarts.
    resolver 127.0.0.11 valid=10s;

    # Contact-form submissions ("Запросить демо" / "Обсудить запуск") go to
    # the lead-service BFF, which forwards them to Telegram. More specific
    # than /api/ below, so nginx matches this one first for /api/leads*.
    # No trailing slash: the frontend calls fetch("/api/leads") with none,
    # and a location-with-slash 301-redirects that, which breaks the POST.
    location /api/leads {
        set $lead_service_upstream http://lead-service:4100;
        proxy_pass $lead_service_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Forwarded to the gallery backend so the frontend can later fetch
    # same-origin `/api/...` and `/uploads/...` URLs with no CORS setup.
    # Unused today (the page still reads the static gallery-data.json),
    # kept ready for when useGalleryData switches to this API.
    # location /api/ {
    #     proxy_pass http://backend:4000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # location /uploads/ {
    #     proxy_pass http://backend:4000;
    # }

    location / {
        # No `$uri/` clause on purpose: the React route "/gallery" collides
        # with the static assets directory "public/gallery/" (image files),
        # so a directory-match here would 403 instead of serving the SPA.
        try_files $uri /index.html;
    }
}
