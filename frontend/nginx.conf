server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forwarded to the gallery backend so the frontend can later fetch
    # same-origin `/api/...` and `/uploads/...` URLs with no CORS setup.
    # Unused today (the page still reads the static gallery-data.json),
    # kept ready for when useGalleryData switches to this API.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /uploads/ {
        proxy_pass http://backend:4000;
    }

    location / {
        # No `$uri/` clause on purpose: the React route "/gallery" collides
        # with the static assets directory "public/gallery/" (image files),
        # so a directory-match here would 403 instead of serving the SPA.
        try_files $uri /index.html;
    }
}
