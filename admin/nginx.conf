server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Must be >= backend's MAX_UPLOAD_MB (see docker-compose.yml), otherwise
    # nginx 413s uploads before they ever reach Express/Multer.
    client_max_body_size 30M;

    location /api/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Media thumbnails/previews rendered by the admin UI come from here.
    location /uploads/ {
        proxy_pass http://backend:4000;
    }

    location / {
        try_files $uri /index.html;
    }
}
